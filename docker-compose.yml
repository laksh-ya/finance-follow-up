services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_EAGER=false
    volumes: ["./backend:/app", "backend_data:/app/data"]
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker -Q high_priority,default,scheduler,dead_letter -c 4 --loglevel=info

  beat:
    build: ./backend
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_EAGER=false
    volumes: ["./backend:/app", "backend_data:/app/data"]
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info

  flower:
    build: ./backend
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports: ["5555:5555"]
    depends_on: [redis]
    command: celery -A app.tasks.celery_app flower --port=5555

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_API_KEY=${API_KEY:-dev-secret-key}
    depends_on: [backend]

volumes:
  redis_data:
  backend_data:
